name: Sync Upstream

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Rebase, Push, and Trigger Build
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          git config user.name "Jebaitedneko"
          git config user.email "Jebaitedneko@gmail.com"

          git remote add upstream https://github.com/openwrt/openwrt.git
          git fetch upstream main

          # Change detection
          LOCAL=$(git rev-parse HEAD)
          UPSTREAM=$(git rev-parse upstream/main)
          BASE=$(git merge-base HEAD upstream/main)

          if [ "$UPSTREAM" = "$BASE" ]; then
            echo "No changes from upstream. Skipping sync."
            exit 0
          fi

          echo "New changes detected. Starting rebase..."

          if git rebase upstream/main; then
            echo "Rebase successful. Force-pushing..."
            git push origin main --force
            echo "Triggering build.yml on $GITHUB_REPOSITORY..."
            sleep 10
            gh workflow run build.yml --repo "$GITHUB_REPOSITORY" --ref main
          else
            echo "Error: Rebase failed."
            git rebase --abort
            exit 1
          fi
